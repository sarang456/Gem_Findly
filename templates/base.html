{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findly | AI-Powered Lost & Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-light">

    <div class="d-flex">
        {% if user.is_authenticated and user.role == 'owner' %}
        {% include 'includes/sidebar.html' %}
        {% endif %}

        <div class="flex-grow-1">
            {% include 'includes/navbar.html' %}

            <main class="{% if user.role == 'owner' %}{% else %}{% endif %}">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <footer class="container text-center py-5 text-muted">
        <hr>
        <p>&copy; 2026 Findly AI Project. Built with Django & TensorFlow.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
