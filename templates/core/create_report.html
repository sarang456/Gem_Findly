{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm border-0 rounded-4 mt-4">
    <div class="card-body p-4">
        <h5 class="fw-bold mb-3"><i class="bi bi-shield-lock me-2 text-primary"></i>Verification Setup</h5>
        <p class="text-muted small">Set the questions a loser must answer to claim this item.</p>

        <div class="mb-3">
            <label class="form-label small fw-bold">Security Question 1 (Required)</label>
            <input type="text" name="question_1" class="form-control rounded-pill" 
                   placeholder="e.g., What is the lock screen wallpaper?">
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">Security Question 2 (Optional)</label>
            <input type="text" name="question_2" class="form-control rounded-pill" 
                   placeholder="e.g., Are there any scratches or stickers?">
        </div>

        <div class="form-check form-switch mt-3">
            <input class="form-check-input" type="checkbox" name="requires_photo" id="photoCheck">
            <label class="form-check-label small fw-bold" for="photoCheck">
                Require photo proof (e.g., receipt or original photo)
            </label>
        </div>
    </div>
</div>
{% endblock %}
